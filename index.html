function b64(file,max){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");let w=img.width,h=img.height,m=max||800;if(w>m){h=h*m/w;w=m;}if(h>m){w=w*m/h;h=m;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",.82));};img.src=r.result;};r.onerror=rej;r.readAsDataURL(file);});}
function parseSec(t){const l=t.split("\n").filter(x=>x.trim());const s=[];let c=null;for(const x of l){if(x.startsWith("##")){if(c)s.push(c);c={ti:x.replace(/^#+\s*/,"").trim(),co:""};}else if(c)c.co+=(c.co?" ":"")+x.trim();else s.push({ti:"Info",co:x.trim()});}if(c)s.push(c);return s;}
const Badge=({text,color})=><span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:11,fontFamily:"sans-serif",fontWeight:500,background:color+"22",color,border:`1px solid ${color}55`}}>{text}</span>;
function AgeBar({annee,color}){const age=new Date().getFullYear()-parseInt(annee);const pct=Math.min((age/50)*100,100);return <div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:"sans-serif",color:"#888",marginBottom:2}}><span>Planté en {annee}</span><span>{age} an{age>1?"s":""}</span></div><div style={{background:"#e8f0d8",borderRadius:4,height:5,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:color,borderRadius:4}}/></div></div>;}
function QR({text,size}){const sz=size||70;const url="https://api.qrserver.com/v1/create-qr-code/?size="+sz+"x"+sz+"&data="+encodeURIComponent(text);return <div style={{width:sz,height:sz,background:"#fff",border:"1px solid #ccc",borderRadius:4,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}><img src={url} width={sz} height={sz} alt="QR" style={{display:"block"}}/></div>;}

  const [sel,setSel]=useState(theme);
  const btn=(ex)=>({fontFamily:"Georgia,serif",fontSize:13,padding:"6px 13px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer",...ex});
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000,padding:12}}>
    <div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:18,width:340,maxWidth:"100%",boxShadow:"0 8px 32px rgba(0,0,0,.4)"}}>
      <p style={{fontSize:16,fontWeight:700,margin:"0 0 4px",color:C.txt}}>🎨 Thème de l'interface</p>
      <p style={{fontSize:12,color:C.mut,fontFamily:"sans-serif",margin:"0 0 16px"}}>Choisis l'apparence de l'application.</p>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
        {Object.entries(THEMES).map(([name,th])=>(
          <button key={name} onClick={()=>setSel(name)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:10,border:`2px solid ${sel===name?th.acc:C.border}`,background:sel===name?th.light:C.card,cursor:"pointer",textAlign:"left"}}>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:th.tbg}}/>
              <div style={{width:18,height:18,borderRadius:"50%",background:th.acc}}/>
              <div style={{width:18,height:18,borderRadius:"50%",background:th.light,border:"1px solid #ccc"}}/>
            </div>
            <span style={{fontSize:14,fontWeight:sel===name?700:400,color:C.txt}}>{name}</span>
            {sel===name&&<span style={{marginLeft:"auto",fontSize:16}}>✓</span>}

      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={btn()}>Annuler</button>

}

function Galerie({photos,onAdd,onDel,C}){
  const [lb,setLb]=useState(null);
  const ph=photos||[];
  const fileRef=useRef();
  const MAX=10;
  const canAdd=ph.length<MAX;
  const lbSwipeX=useRef(null);
  const onLbTS=e=>{lbSwipeX.current=e.touches[0].clientX;};
  const onLbTE=e=>{if(lbSwipeX.current===null)return;const dx=e.changedTouches[0].clientX-lbSwipeX.current;if(Math.abs(dx)>50)setLb(i=>(i+(dx<0?1:-1)+ph.length)%ph.length);lbSwipeX.current=null;};
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:8,marginBottom:10}}>
      {ph.map((p,i)=><div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:9,overflow:"hidden",border:`1.5px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setLb(i)}>
        <img src={p} alt={`Photo ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
        <button onClick={e=>{e.stopPropagation();onDel(i);}} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,.55)",color:"#fff",border:"none",borderRadius:"50%",width:20,height:20,fontSize:13,cursor:"pointer",lineHeight:"20px",textAlign:"center",padding:0}}>×</button>
        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.5))",padding:"4px 5px",fontSize:9,color:"rgba(255,255,255,.8)",fontFamily:"sans-serif",textAlign:"right"}}>📷 {i+1}/{ph.length}</div>
      </div>)}
      {canAdd&&<div onClick={()=>fileRef.current.click()} style={{aspectRatio:"1",borderRadius:9,border:`2px dashed ${C.acc}55`,background:C.light,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:4,minHeight:80}}>
        <span style={{fontSize:22,color:C.acc}}>+</span>
        <span style={{fontSize:9,color:C.acc,fontFamily:"sans-serif"}}>Photo</span>
      </div>}
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>{ph.length}/{MAX} photos</span>
      {!canAdd&&<span style={{fontSize:10,color:C.dan,fontFamily:"sans-serif"}}>Maximum atteint</span>}
    </div>
    <input ref={fileRef} type="file" accept="image/*" multiple onChange={async e=>{
      const files=Array.from(e.target.files).slice(0,MAX-ph.length);
      for(const f of files){try{onAdd(await b64(f,1000));}catch(err){console.error(err);}}
      e.target.value="";
    }} style={{display:"none"}}/>
    {lb!==null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,flexDirection:"column",gap:10}}
      onClick={()=>setLb(null)} onTouchStart={onLbTS} onTouchEnd={onLbTE}>
      <img src={ph[lb]} style={{maxWidth:"92vw",maxHeight:"78vh",borderRadius:10,objectFit:"contain"}} onClick={e=>e.stopPropagation()} alt=""/>
      <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
        {ph.map((_,i)=><div key={i} onClick={()=>setLb(i)} style={{width:i===lb?28:8,height:8,borderRadius:4,background:i===lb?"#fff":"rgba(255,255,255,.35)",cursor:"pointer",transition:"width .2s"}}/>)}
      </div>
      <button onClick={()=>setLb(null)} style={{position:"absolute",top:16,right:20,background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:"50%",width:36,height:36}}>×</button>
      {ph.length>1&&<>
        <button onClick={e=>{e.stopPropagation();setLb((lb-1+ph.length)%ph.length);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontSize:26,cursor:"pointer",borderRadius:"50%",width:40,height:40}}>‹</button>
        <button onClick={e=>{e.stopPropagation();setLb((lb+1)%ph.length);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontSize:26,cursor:"pointer",borderRadius:"50%",width:40,height:40}}>›</button>
      </>}
    </div>}
  </div>;
}

function Graf({list,color,C}){
  if(!list||!list.length)return <p style={{color:C.mut,fontStyle:"italic",fontSize:13,textAlign:"center",padding:"10px 0"}}>Aucune récolte.</p>;
  const s=[...list].sort((a,b)=>a.annee-b.annee);const pq=q=>{const n=parseFloat((q+"").replace(",","."));return isNaN(n)?0:n;};
  const vals=s.map(r=>pq(r.quantite));const max=Math.max(...vals,1);const total=vals.reduce((a,b)=>a+b,0);const record=s[vals.indexOf(Math.max(...vals))];
  return <div><div style={{display:"flex",gap:12,marginBottom:10}}><div style={{background:color+"11",border:`1px solid ${color}44`,borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}}><div style={{fontSize:10,fontFamily:"sans-serif",color,textTransform:"uppercase",letterSpacing:.5}}>Total</div><div style={{fontSize:16,fontWeight:700,color,fontFamily:"sans-serif"}}>{total.toFixed(1)}</div></div>{record&&<div style={{background:color+"11",border:`1px solid ${color}44`,borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}}><div style={{fontSize:10,fontFamily:"sans-serif",color,textTransform:"uppercase",letterSpacing:.5}}>Record {record.annee}</div><div style={{fontSize:16,fontWeight:700,color,fontFamily:"sans-serif"}}>{record.quantite} 🏆</div></div>}</div>
  <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80,paddingBottom:4}}>{s.map((r,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{fontSize:10,fontFamily:"sans-serif",color:C.mut}}>{r.quantite}</div><div style={{width:"100%",height:Math.max((vals[i]/max)*68,4),background:vals[i]===Math.max(...vals)?color+"dd":color+"88",borderRadius:"4px 4px 0 0"}}/><div style={{fontSize:10,fontFamily:"sans-serif",color:C.mut,whiteSpace:"nowrap"}}>{r.annee}</div></div>)}</div></div>;
}

function Meteo({C,onGel}){
  const [m,setM]=useState(null);const [ld,setLd]=useState(false);const [er,setEr]=useState(null);
  useEffect(()=>{setLd(true);if(!navigator.geolocation){setEr("Géoloc. non disponible");setLd(false);return;}
    navigator.geolocation.getCurrentPosition(async pos=>{try{
      const{latitude:la,longitude:lo}=pos.coords;
      const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude="+la+"&longitude="+lo+"&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=3");
      const d=await r.json();
      const wc=d.current.weather_code;
      const ic=wc<=1?"☀️":wc<=3?"⛅":wc<=48?"🌫️":wc<=67?"🌧️":wc<=77?"🌨️":wc<=82?"🌦️":"⛈️";
      const gelDays=d.daily.temperature_2m_min.map((t,i)=>({j:i,t,date:new Date(d.daily.time[i]).toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})})).filter(x=>x.t<=1);
      setM({temp:Math.round(d.current.temperature_2m),ic,wind:Math.round(d.current.wind_speed_10m),hum:d.current.relative_humidity_2m,min:Math.round(d.daily.temperature_2m_min[0]),max:Math.round(d.daily.temperature_2m_max[0]),gelDays});
      if(gelDays.length>0&&onGel)onGel(gelDays);
    }catch{setEr("Météo indisponible");}setLd(false);},()=>{setEr("Localisation refusée");setLd(false);});
  },[]);
  if(ld)return <div style={{fontSize:12,color:C.mut,fontFamily:"sans-serif",padding:"6px 0"}}>🌤️ Chargement météo…</div>;
  if(er)return <div style={{fontSize:11,color:C.mut,fontFamily:"sans-serif",padding:"4px 0"}}>{er}</div>;
  if(!m)return null;
  return <div>
    <div style={{background:C.light,borderRadius:10,padding:"10px 14px",marginBottom:m.gelDays&&m.gelDays.length>0?8:14,display:"flex",alignItems:"center",gap:14,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:30}}>{m.ic}</div>
      <div style={{flex:1}}><div style={{fontSize:20,fontWeight:700,color:C.acc,fontFamily:"sans-serif",lineHeight:1}}>{m.temp}°C</div><div style={{fontSize:11,color:C.mut,fontFamily:"sans-serif"}}>Min {m.min}° · Max {m.max}°</div></div>
      <div style={{fontSize:11,color:C.mut,fontFamily:"sans-serif",textAlign:"right"}}><div>💨 {m.wind} km/h</div><div>💧 {m.hum}%</div></div>
    </div>
    {m.gelDays&&m.gelDays.length>0&&<div style={{background:"#1a3a6a11",border:"1.5px solid #4a7abf",borderRadius:10,padding:"9px 13px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontSize:18,flexShrink:0}}>🧊</span>
      <div><div style={{fontSize:12,fontWeight:700,color:"#4a7abf",fontFamily:"sans-serif",marginBottom:3}}>Risque de gel dans les 3 prochains jours</div>
        {m.gelDays.map((g,i)=><div key={i} style={{fontSize:11,color:"#4a7abf",fontFamily:"sans-serif"}}>{g.date} : {g.t}°C — Protégez figuiers, pêchers et plants fragiles</div>)}
      </div>
    </div>}
  </div>;
}

function AlerteSante({arbres,C,onFiche}){
  const malades=arbres.filter(a=>a.sante==="Malade");const surveiller=arbres.filter(a=>a.sante==="À surveiller");

  return <div style={{marginBottom:14}}>{malades.length>0&&<div style={{background:"#b8404011",border:"1px solid #b8404044",borderRadius:10,padding:"10px 14px",marginBottom:8}}><div style={{fontSize:12,fontWeight:700,color:"#b84040",marginBottom:6}}>🔴 {malades.length} arbre{malades.length>1?"s":""} malade{malades.length>1?"s":""}</div>{malades.map(a=><div key={a.id} onClick={()=>onFiche(a)} style={{fontSize:12,color:"#b84040",cursor:"pointer",padding:"2px 0",textDecoration:"underline"}}>{gvi(a.variete)} {a.nom}</div>)}</div>}{surveiller.length>0&&<div style={{background:"#8a6d1e11",border:"1px solid #8a6d1e44",borderRadius:10,padding:"10px 14px"}}><div style={{fontSize:12,fontWeight:700,color:"#8a6d1e",marginBottom:6}}>🟡 {surveiller.length} à surveiller</div>{surveiller.map(a=><div key={a.id} onClick={()=>onFiche(a)} style={{fontSize:12,color:"#8a6d1e",cursor:"pointer",padding:"2px 0",textDecoration:"underline"}}>{gvi(a.variete)} {a.nom}</div>)}</div>}</div>;
}

function Dashboard({arbres,varietes,recoltes,journal,C,onFiche,getCol,onFiltreVariete,onGel}){
  const byV={};arbres.forEach(a=>{const v=a.variete;if(v)byV[v]=(byV[v]||0)+1;});
  const san={"Bon":0,"À surveiller":0,"Malade":0};arbres.forEach(a=>{san[a.sante||"Bon"]++;});
  const maxV=Math.max(...Object.values(byV),1);const mo=new Date().getMonth()+1;const raps=getR(mo,arbres);
  const pq=q=>{const n=parseFloat((q+"").replace(",","."));return isNaN(n)?0:n;};
  const totalRec=Object.values(recoltes).flat();const totalKg=totalRec.reduce((s,r)=>s+pq(r.quantite),0);
  const parAnnee={};totalRec.forEach(r=>{if(r.annee)parAnnee[r.annee]=(parAnnee[r.annee]||0)+pq(r.quantite);});
  const meilleureAnnee=Object.entries(parAnnee).sort((a,b)=>b[1]-a[1])[0];
  const ageMoyen=arbres.length?Math.round(arbres.reduce((s,a)=>s+(new Date().getFullYear()-parseInt(a.annee)),0)/arbres.length):0;

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>{[{v:arbres.length,l:"Arbres plantés",e:"🌳"},{v:Object.keys(byV).length,l:"Variétés",e:"🌿"},{v:ageMoyen+" ans",l:"Âge moyen",e:"⏳"},{v:Object.values(journal).flat().length,l:"Notes journal",e:"📓"}].map(({v,l,e})=>(<div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}><div style={{fontSize:20}}>{e}</div><div><div style={{fontSize:18,fontWeight:700,color:C.acc,fontFamily:"sans-serif",lineHeight:1}}>{v}</div><div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>{l}</div></div></div>))}</div>
    {totalRec.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:14}}><p style={{fontSize:11,fontFamily:"sans-serif",fontWeight:700,color:C.mut,textTransform:"uppercase",letterSpacing:.5,margin:"0 0 8px"}}>🍎 Récoltes cumulées</p><div style={{display:"flex",gap:10}}><div style={{flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.acc,fontFamily:"sans-serif"}}>{totalKg.toFixed(1)}</div><div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>Total</div></div>{meilleureAnnee&&<div style={{flex:1,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:C.acc,fontFamily:"sans-serif"}}>{meilleureAnnee[0]} 🏆</div><div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>Meilleure année</div></div>}</div></div>}
    <div style={{marginBottom:14}}><p style={{fontSize:11,fontFamily:"sans-serif",fontWeight:700,color:C.mut,textTransform:"uppercase",letterSpacing:.5,margin:"0 0 6px"}}>État de santé</p><div style={{display:"flex",gap:8}}>{Object.entries(SAN).map(([k,sv])=>{const col=sv.c;return <div key={k} style={{flex:1,background:col+"11",border:`1px solid ${col}44`,borderRadius:8,padding:"8px 6px",textAlign:"center"}}><div style={{fontSize:16}}>{sv.i}</div><div style={{fontSize:16,fontWeight:700,color:col,fontFamily:"sans-serif"}}>{san[k]}</div><div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>{k}</div></div>;})}</div></div>
    {Object.keys(byV).length>0&&<div style={{marginBottom:14}}>
      <p style={{fontSize:11,fontFamily:"sans-serif",fontWeight:700,color:C.mut,textTransform:"uppercase",letterSpacing:.5,margin:"0 0 6px"}}>Par variété <span style={{fontSize:10,fontWeight:400,textTransform:"none",letterSpacing:0}}>— tap pour filtrer</span></p>
      {Object.entries(byV).sort((a,b)=>b[1]-a[1]).map(([v,n])=>{
        const col=getCol(v);
        return <div key={v} onClick={()=>onFiltreVariete(v)} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,cursor:"pointer",padding:"4px 6px",borderRadius:8,transition:"background .15s"}}
          onMouseEnter={e=>e.currentTarget.style.background=col+"18"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <span style={{fontSize:14}}>{gvi(v)}</span>
          <span style={{fontSize:12,width:78,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.txt}}>{v}</span>
          <div style={{flex:1,background:C.light,borderRadius:4,height:12,overflow:"hidden"}}>
            <div style={{width:`${(n/maxV)*100}%`,height:"100%",background:col,borderRadius:4}}/>
          </div>
          <span style={{fontSize:12,fontFamily:"sans-serif",color:C.mut,minWidth:14,textAlign:"right"}}>{n}</span>
          <span style={{fontSize:10,color:col,fontFamily:"sans-serif",minWidth:16}}>→</span>

    {raps.length>0&&<div><p style={{fontSize:11,fontFamily:"sans-serif",fontWeight:700,color:C.mut,textTransform:"uppercase",letterSpacing:.5,margin:"0 0 6px"}}>🗓️ À faire en {ML[mo]}</p>{raps.map((r,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 13px",marginBottom:8,borderLeft:`3px solid ${C.acc}`}}><div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{r.e} {r.t}</div><div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>{r.d}</div></div>)}</div>}

}

const RN_KEY="verger-rappels-notes";

function Rappels({arbres,C,onGel}){
  const [mo,setMo]=useState(new Date().getMonth()+1);
  const raps=getR(mo,arbres);
  const [notes,setNotes]=useState(()=>{try{const r=localStorage.getItem(RN_KEY);return r?JSON.parse(r):{};}catch{return {};}});
  const [newNote,setNewNote]=useState("");
  const saveNotes=n=>{setNotes(n);try{localStorage.setItem(RN_KEY,JSON.stringify(n));}catch{}};
  const addNote=()=>{
    if(!newNote.trim())return;
    const e={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),texte:newNote.trim()};
    const mNotes=[...(notes[mo]||[]),e];
    saveNotes({...notes,[mo]:mNotes});
    setNewNote("");
  };
  const delNote=(mo2,id)=>{
    const mNotes=(notes[mo2]||[]).filter(n=>n.id!==id);
    saveNotes({...notes,[mo2]:mNotes});
  };
  const moNotes=notes[mo]||[];
  const btn=(ex)=>({fontFamily:"Georgia,serif",fontSize:12,padding:"4px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer",...ex});

  return <div>
    <Meteo C={C} onGel={onGel}/>
    {/* Sélecteur de mois */}
    <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
      {ML.slice(1).map((m,i)=>{const mo2=i+1;const a=mo2===mo;const cur=mo2===new Date().getMonth()+1;return <button key={mo2} onClick={()=>setMo(mo2)} style={{fontSize:11,fontFamily:"sans-serif",padding:"4px 8px",borderRadius:7,border:`1px solid ${a?C.acc:C.border}`,background:a?C.acc:cur?C.light:C.card,color:a?"#fff":C.txt,cursor:"pointer",fontWeight:cur?700:400,position:"relative"}}>
        {m.slice(0,3)}
        {(notes[mo2]||[]).length>0&&<span style={{position:"absolute",top:-4,right:-4,width:8,height:8,borderRadius:"50%",background:C.acc,border:`1px solid ${C.bg}`}}/>}
      </button>;})}
    </div>

    <p style={{fontSize:14,fontWeight:700,color:C.acc,margin:"0 0 10px",fontFamily:"'Playfair Display',Georgia,serif"}}>{ML[mo]}</p>

    {/* Rappels saisonniers automatiques */}
    {raps.length===0&&<p style={{color:C.mut,fontStyle:"italic",fontSize:13,textAlign:"center",padding:"10px 0"}}>Pas de tâche saisonnière ce mois-ci.</p>}
    {raps.map((r,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 13px",marginBottom:8,borderLeft:`3px solid ${C.acc}`}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{r.e} {r.t}</div>
      <div style={{fontSize:13,color:C.mut,lineHeight:1.6}}>{r.d}</div>
      {r.v&&<div style={{marginTop:5,fontSize:11,color:C.acc,fontFamily:"sans-serif"}}>Concerne : {r.v.filter(v=>arbres.some(a=>a.variete===v)).join(" · ")||"(aucun)"}</div>}
    </div>)}

    {/* Notes manuelles */}
    <div style={{marginTop:18,borderTop:`1.5px solid ${C.border}`,paddingTop:14}}>
      <p style={{fontSize:13,fontWeight:700,color:C.txt,margin:"0 0 10px",fontFamily:"'Playfair Display',Georgia,serif"}}>📝 Mes notes — {ML[mo]}</p>
      {/* Saisie */}
      <div style={{display:"flex",gap:7,marginBottom:12}}>
        <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),addNote())} rows={2}
          placeholder={`Ajouter une note pour ${ML[mo]}…`}
          style={{flex:1,fontFamily:"Georgia,serif",fontSize:13,padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:8,background:C.card,color:C.txt,resize:"none"}}/>
        <button onClick={addNote} style={btn({background:C.acc,color:"#fff",borderColor:C.acc,alignSelf:"flex-end",padding:"7px 13px"})}>＋</button>
      </div>
      {/* Liste des notes */}
      {moNotes.length===0&&<p style={{color:C.mut,fontStyle:"italic",fontSize:12,textAlign:"center",padding:"8px 0"}}>Aucune note ce mois-ci.</p>}
      {[...moNotes].reverse().map(n=><div key={n.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px",marginBottom:7,display:"flex",gap:8,borderLeft:`3px solid ${C.acc2}`}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",marginBottom:3}}>{n.date}</div>
          <div style={{fontSize:13,color:C.txt,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{n.texte}</div>
        </div>
        <button onClick={()=>delNote(mo,n.id)} style={btn({padding:"2px 7px",color:C.dan,borderColor:C.dan+"44",alignSelf:"flex-start",fontSize:12})}>✕</button>
      </div>)}
    </div>
  </div>;
}

function FicheVerger({arbres,varietes,recoltes,onClose,getCol,C}){
  const pq=q=>{const n=parseFloat((q+"").replace(",","."));return isNaN(n)?0:n;};
  const byV={};arbres.forEach(a=>{const v=a.variete;if(v)byV[v]=(byV[v]||0)+1;});
  const totalKg=Object.values(recoltes).flat().reduce((s,r)=>s+pq(r.quantite),0);
  const ageMoyen=arbres.length?Math.round(arbres.reduce((s,a)=>s+(new Date().getFullYear()-parseInt(a.annee)),0)/arbres.length):0;
  const imprimerRecap=()=>{
    const now=new Date().toLocaleDateString("fr-FR");
    const rows=[...arbres].sort((a,b)=>a.variete.localeCompare(b.variete)||a.nom.localeCompare(b.nom)).map((a,i)=>{
      const col=getCol(a.variete);const age=new Date().getFullYear()-parseInt(a.annee);
      return "<tr style='background:"+(i%2===0?"#f8f6f2":"#fff")+";border-bottom:1px solid #e8e0d0;'>"
        +"<td style='padding:5px 8px;color:#888;font-size:11px;'>#"+String(a.numero||"—").padStart(3,"0")+"</td>"
        +"<td style='padding:5px 8px;font-weight:600;'>"+gvi(a.variete)+" "+a.nom+"</td>"
        +"<td style='padding:5px 8px;'><span style='background:"+col+"22;color:"+col+";padding:1px 7px;border-radius:10px;font-size:11px;'>"+a.variete+"</span></td>"
        +"<td style='padding:5px 8px;font-size:11px;'>"+a.annee+"</td>"
        +"<td style='padding:5px 8px;font-size:11px;'>"+age+" ans</td>"
        +"<td style='padding:5px 8px;font-size:14px;'>"+SAN[a.sante||"Bon"].i+"</td>"
        +"</tr>";
    }).join("");
    const stats=[{e:"🌳",v:arbres.length,l:"Arbres"},{e:"🌿",v:Object.keys(byV).length,l:"Variétés"},{e:"⏳",v:ageMoyen+" ans",l:"Âge moyen"},{e:"🍎",v:totalKg.toFixed(1),l:"kg récoltés"}];
    const statCells=stats.map(s=>"<div style='border:1px solid #e0d8c8;border-radius:8px;padding:12px 8px;text-align:center;background:#f8f6f2;'><div style='font-size:20px;'>"+s.e+"</div><div style='font-size:18px;font-weight:700;color:#4a7c3f;'>"+s.v+"</div><div style='font-size:10px;color:#888;'>"+s.l+"</div></div>").join("");
    const html="<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'/><title>Mon Verger — Récapitulatif</title>"
      +"<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Georgia,serif;padding:28px 36px;color:#1a1a1a;background:#fff;max-width:760px;margin:0 auto;}table{width:100%;border-collapse:collapse;}th{text-align:left;}"
      +"@page{margin:.8cm;size:A4 portrait;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style></head><body>"
      +"<div style='border-bottom:3px solid #4a7c3f;padding-bottom:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;'><div><div style='font-size:26px;font-weight:700;'>🌳 Mon Verger</div><div style='font-size:13px;color:#888;'>Récapitulatif · "+now+"</div></div><div style='font-size:22px;font-weight:700;color:#4a7c3f;'>"+arbres.length+" arbres</div></div>"
      +"<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;'>"+statCells+"</div>"
      +"<div style='font-size:11px;font-weight:700;color:#4a7c3f;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #e0d8c8;padding-bottom:4px;margin-bottom:10px;'>Liste des arbres</div>"
      +"<table><thead><tr style='background:#f0ede6;'>"+["N°","Nom","Variété","Année","Âge","Santé"].map(h=>"<th style='padding:6px 8px;font-size:10px;text-transform:uppercase;color:#888;font-weight:600;border-bottom:1px solid #e0d8c8;'>"+h+"</th>").join("")+"</tr></thead><tbody>"+rows+"</tbody></table>"

      +"<script>window.onload=function(){window.print();window.close();}<\/script></body></html>";
    const blob=new Blob([html],{type:'text/html'});const burl=URL.createObjectURL(blob);window.open(burl,'_blank');setTimeout(()=>URL.revokeObjectURL(burl),10000);
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",zIndex:1000,padding:"14px 6px"}}>

        <button onClick={onClose} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"6px 13px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer"}}>✕ Fermer</button>
      </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>{[{v:arbres.length,l:"Arbres",e:"🌳"},{v:Object.keys(byV).length,l:"Variétés",e:"🌿"},{v:ageMoyen+" ans",l:"Âge moyen",e:"⏳"},{v:totalKg.toFixed(1),l:"kg récoltés",e:"🍎"}].map(({v,l,e})=>(<div key={l} style={{background:C.light,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 8px",textAlign:"center"}}><div style={{fontSize:18}}>{e}</div><div style={{fontSize:18,fontWeight:700,color:C.acc,fontFamily:"sans-serif"}}>{v}</div><div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>{l}</div></div>))}</div>

          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:C.light}}>{["N°","Nom","Variété","Année","Âge","Santé"].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",fontFamily:"sans-serif",fontSize:10,textTransform:"uppercase",color:C.mut,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>
          <tbody>{[...arbres].sort((a,b)=>a.variete.localeCompare(b.variete)||a.nom.localeCompare(b.nom)).map((a,i)=>{const col=getCol(a.variete);const age=new Date().getFullYear()-parseInt(a.annee);return <tr key={a.id} style={{background:i%2===0?C.card:C.light,borderBottom:`1px solid ${C.border}`}}><td style={{padding:"5px 8px",fontFamily:"sans-serif",color:C.mut,fontSize:11}}>#{String(a.numero||"—").padStart(3,"0")}</td><td style={{padding:"5px 8px",fontWeight:600,color:C.txt}}>{gvi(a.variete)} {a.nom}</td><td style={{padding:"5px 8px"}}><span style={{background:col+"22",color:col,padding:"1px 7px",borderRadius:10,fontSize:11,fontFamily:"sans-serif"}}>{a.variete}</span></td><td style={{padding:"5px 8px",fontFamily:"sans-serif",fontSize:11,color:C.txt}}>{a.annee}</td><td style={{padding:"5px 8px",fontFamily:"sans-serif",fontSize:11,color:C.txt}}>{age} ans</td><td style={{padding:"5px 8px",fontSize:13}}>{SAN[a.sante||"Bon"].i}</td></tr>;})}
          </tbody></table>
        </div>
        <div style={{paddingTop:8,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",fontSize:10,color:C.mut,fontFamily:"sans-serif"}}><span>Mon Verger · Récapitulatif</span><span>{new Date().toLocaleDateString("fr-FR")}</span></div>
      </div>
    </div>
  </div>;
}

function VarForm({varietes,onSave,onClose,C}){

      <div style={{maxHeight:200,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:5}}>{list.map(v=><div key={v} style={{display:"flex",alignItems:"center",background:C.light,borderRadius:7,padding:"5px 10px",gap:8}}><span style={{fontSize:16}}>{gvi(v)}</span><span style={{flex:1,fontSize:13,color:C.txt}}>{v}</span><button onClick={()=>setList(list.filter(x=>x!==v))} style={{...btn(),padding:"2px 8px",color:C.dan,borderColor:C.dan+"44"}}>✕</button></div>)}</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}><input value={nv} onChange={e=>setNv(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nouvelle variété…" style={{...inp,flex:1}}/><button onClick={add} style={btn({background:C.acc,color:"#fff",borderColor:C.acc})}>+</button></div>

function TreeForm({initial,varietes,arbres,onSave,onClose,C}){
  const [form,setForm]=useState(initial||{numero:"",nom:"",variete:varietes[0]||"",annee:new Date().getFullYear(),description:"",sante:"Bon",photo:"",photos:[],origine:"Pépinière",dateAchat:"",pollinisateur:""});

  const [wikiLoad,setWikiLoad]=useState(false);
  const [wikiErr,setWikiErr]=useState(null);
  const [showWiki,setShowWiki]=useState(false);
  const [sites,setSites]=useState(()=>{try{const r=localStorage.getItem(SK_SITES);return r?JSON.parse(r):SITES_DEFAULT;}catch{return SITES_DEFAULT;}});
  const [editSites,setEditSites]=useState(false);
  const [newSite,setNewSite]=useState({nom:"",emoji:"🔗",url:""});

  // Sync wikiQuery avec le nom de l'arbre saisi
  useEffect(()=>{if(form.nom&&!wikiQuery)setWikiQuery(form.nom);},[form.nom]);

  const inp={fontSize:13,padding:"7px 10px",border:`1px solid ${C.border}`,borderRadius:8,background:C.card,color:C.txt,width:"100%",boxSizing:"border-box"};
  const btn=(ex)=>({fontFamily:"Georgia,serif",fontSize:13,padding:"6px 13px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer",...ex});
  const inpSm={fontSize:12,padding:"6px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:C.card,color:C.txt};

  const searchWiki=async()=>{
    if(!wikiQuery.trim())return;
    setWikiLoad(true);setWikiErr(null);setWikiResult(null);setWikiSuggs([]);
    try{
      const r=await fetch(`https://fr.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(wikiQuery)}&limit=5&namespace=0&format=json&origin=*`);
      const d=await r.json();
      const titres=d[1]||[];
      if(titres.length===0){setWikiErr("Aucun résultat.");setWikiLoad(false);return;}
      if(titres.length===1){await loadWikiPage(titres[0]);}
      else{setWikiSuggs(titres);}
    }catch{setWikiErr("Erreur de connexion.");}
    setWikiLoad(false);
  };

  const loadWikiPage=async(title)=>{
    setWikiLoad(true);setWikiSuggs([]);
    try{
      const r=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}?redirect=true`,{headers:{accept:"application/json"}});
      if(!r.ok)throw new Error();
      const d=await r.json();
      setWikiResult({titre:d.title,extrait:d.extract,url:d.content_urls?.desktop?.page});
    }catch{
      try{
        const r2=await fetch(`https://fr.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
        const d2=await r2.json();
        const p=Object.values(d2.query.pages)[0];
        if(p?.extract)setWikiResult({titre:p.title,extrait:p.extract.slice(0,800),url:`https://fr.wikipedia.org/wiki/${encodeURIComponent(p.title)}`});
        else throw new Error();
      }catch{setWikiErr("Impossible de charger la page.");}
    }
    setWikiLoad(false);
  };

  const importWiki=()=>{
    if(!wikiResult)return;
    sf("description",(form.description?form.description+"\n\n":"")+wikiResult.extrait);
    setWikiResult(null);
  };

  const saveSites=s=>{setSites(s);try{localStorage.setItem(SK_SITES,JSON.stringify(s));}catch{}};
  const addSite=()=>{if(!newSite.nom.trim()||!newSite.url.trim())return;saveSites([...sites,{...newSite,id:Date.now()}]);setNewSite({nom:"",emoji:"🔗",url:""});};
  const siteUrl=s=>s.url.replace("{q}",encodeURIComponent(wikiQuery));

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:10}}>
    <div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:18,width:360,maxWidth:"100%",maxHeight:"96vh",overflowY:"auto"}}>
      <p style={{fontSize:16,fontWeight:700,margin:"0 0 14px",color:C.txt}}>{initial?"Modifier":"Ajouter un arbre"}</p>

      {/* ── Recherche Wikipedia (accordéon) ── */}
      <div style={{marginBottom:14,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
        <button onClick={()=>setShowWiki(s=>!s)} style={{width:"100%",background:C.light,border:"none",padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontFamily:"Georgia,serif",fontSize:12,color:C.acc}}>
          <span style={{flex:1,textAlign:"left",fontWeight:600}}>🔍 Recherche & documentation</span>
          <span style={{fontSize:11,color:C.mut}}>{showWiki?"▲":"▼"}</span>
        </button>
        {showWiki&&<div style={{padding:"10px 12px",background:C.bg}}>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <input value={wikiQuery} onChange={e=>{setWikiQuery(e.target.value);setWikiSuggs([]);setWikiResult(null);}} onKeyDown={e=>e.key==="Enter"&&searchWiki()}
              placeholder="Nom commun ou latin…" style={{...inpSm,flex:1}}/>
            <button onClick={searchWiki} disabled={wikiLoad} style={{...btn({background:C.acc,color:"#fff",borderColor:C.acc,fontSize:12,padding:"4px 10px"}),opacity:wikiLoad?.6:1,minWidth:36}}>
              {wikiLoad?"⏳":"🔍"}
            </button>
          </div>
          {wikiErr&&<p style={{fontSize:11,color:C.dan,fontFamily:"sans-serif",margin:"0 0 6px"}}>{wikiErr}</p>}
          {wikiSuggs.length>0&&<div style={{marginBottom:8}}>
            <p style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",margin:"0 0 5px"}}>Plusieurs résultats :</p>
            {wikiSuggs.map(t=><button key={t} onClick={()=>loadWikiPage(t)}
              style={{...btn({fontSize:11,display:"block",width:"100%",textAlign:"left",marginBottom:4,padding:"5px 10px"}),borderLeft:`3px solid ${C.acc}`}}>{t}</button>)}
          </div>}
          {wikiResult&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",marginBottom:8}}>
            <p style={{fontSize:12,fontWeight:700,color:C.txt,margin:"0 0 4px"}}>{wikiResult.titre}</p>
            <p style={{fontSize:11.5,color:C.txt,lineHeight:1.6,margin:"0 0 8px",maxHeight:90,overflowY:"auto"}}>{wikiResult.extrait}</p>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <button onClick={importWiki} style={btn({background:C.acc,color:"#fff",borderColor:C.acc,fontSize:11,padding:"3px 10px"})}>↓ Importer dans Notes</button>
              {wikiResult.url&&<a href={wikiResult.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:C.acc,fontFamily:"sans-serif"}}>Wikipedia →</a>}
              <button onClick={()=>setWikiResult(null)} style={btn({fontSize:11,padding:"3px 7px"})}>✕</button>
            </div>
          </div>}
          {/* Liens externes */}
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <p style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",margin:0,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Rechercher aussi sur</p>
              <button onClick={()=>setEditSites(e=>!e)} style={btn({fontSize:10,padding:"2px 7px",color:C.mut})}>{editSites?"✕":"⚙️ Gérer"}</button>
            </div>
            {editSites&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 10px",marginBottom:8}}>
              {sites.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{fontSize:14}}>{s.emoji}</span>
                <span style={{fontSize:11,flex:1,color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.nom}</span>
                <button onClick={()=>saveSites(sites.filter(x=>x.id!==s.id))} style={btn({fontSize:10,padding:"2px 6px",color:C.dan,borderColor:C.dan+"44"})}>✕</button>
              </div>)}
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:7,marginTop:5,display:"flex",flexDirection:"column",gap:5}}>
                <p style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",margin:0}}>Ajouter — utilise <code style={{background:C.light,padding:"1px 4px",borderRadius:3}}>{"{q}"}</code> dans l'URL</p>
                <div style={{display:"flex",gap:5}}>
                  <input value={newSite.emoji} onChange={e=>setNewSite(s=>({...s,emoji:e.target.value}))} style={{...inpSm,width:36,textAlign:"center"}} maxLength={2}/>
                  <input value={newSite.nom} onChange={e=>setNewSite(s=>({...s,nom:e.target.value}))} style={{...inpSm,flex:1}} placeholder="Nom du site"/>
                </div>
                <div style={{display:"flex",gap:5}}>
                  <input value={newSite.url} onChange={e=>setNewSite(s=>({...s,url:e.target.value}))} style={{...inpSm,flex:1,fontSize:11}} placeholder="https://site.fr/search?q={q}"/>
                  <button onClick={addSite} style={btn({background:C.acc,color:"#fff",borderColor:C.acc,padding:"4px 9px"})}>+</button>
                </div>
              </div>
            </div>}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {sites.map(s=><a key={s.id} href={siteUrl(s)} target="_blank" rel="noreferrer"
                style={{fontSize:11,fontFamily:"sans-serif",padding:"4px 10px",borderRadius:7,background:C.card,border:`1px solid ${C.border}`,color:C.acc,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}>
                {s.emoji} {s.nom} →
              </a>)}
            </div>
          </div>
        </div>}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:10}}><div style={{flex:1}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Numéro</label><input value={form.numero} onChange={e=>sf("numero",e.target.value)} placeholder="001" style={inp}/></div><div style={{flex:2}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Nom</label><input value={form.nom} onChange={e=>sf("nom",e.target.value)} placeholder="Reine des Reinettes" style={inp}/></div></div>
      <div style={{display:"flex",gap:8,marginBottom:10}}><div style={{flex:2}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Variété</label><select value={form.variete} onChange={e=>sf("variete",e.target.value)} style={inp}>{varietes.map(v=><option key={v} value={v}>{gvi(v)} {v}</option>)}</select></div><div style={{flex:1}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Année</label><input type="number" value={form.annee} onChange={e=>sf("annee",e.target.value)} style={inp}/></div></div>
      <div style={{display:"flex",gap:8,marginBottom:10}}><div style={{flex:2}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Origine</label><select value={form.origine||"Pépinière"} onChange={e=>sf("origine",e.target.value)} style={inp}>{ORIGINES.map(o=><option key={o}>{o}</option>)}</select></div><div style={{flex:2}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Date d'achat</label><input type="date" value={form.dateAchat||""} onChange={e=>sf("dateAchat",e.target.value)} style={inp}/></div></div>
      <div style={{marginBottom:10}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>🌸 Pollinisateur</label><select value={form.pollinisateur||""} onChange={e=>sf("pollinisateur",e.target.value)} style={inp}><option value="">— Aucun —</option>{arbres.filter(a=>a.id!==initial?.id).map(a=><option key={a.id} value={a.id}>{gvi(a.variete)} {a.nom}</option>)}</select></div>
      <div style={{marginBottom:10}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Santé</label><div style={{display:"flex",gap:6}}>{Object.entries(SAN).map(([k,v])=><button key={k} onClick={()=>sf("sante",k)} style={{...btn({flex:1,fontSize:11}),background:form.sante===k?v.c+"22":C.card,borderColor:form.sante===k?v.c:C.border,color:form.sante===k?v.c:C.mut}}>{v.i} {k}</button>)}</div></div>
      <div style={{marginBottom:10}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:5}}>Photo principale</label><input ref={photoRef} type="file" accept="image/*" onChange={async e=>{const f=e.target.files[0];if(!f)return;try{sf("photo",await b64(f));}catch(err){console.error(err);}e.target.value="";}} style={{display:"none"}}/><button onClick={()=>photoRef.current.click()} style={{fontFamily:"Georgia,serif",fontSize:12,padding:"8px 16px",borderRadius:8,border:`1px solid ${C.border}`,background:C.light,color:C.acc,cursor:"pointer",width:"100%"}}>📷 {form.photo?"Changer la photo":"Choisir une photo"}</button>{form.photo&&<img src={form.photo} alt="" style={{marginTop:6,width:"100%",height:80,objectFit:"cover",borderRadius:7,border:`1px solid ${C.border}`}}/>}</div>
      <div style={{marginBottom:14}}><label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3}}>Notes</label><textarea value={form.description} onChange={e=>sf("description",e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/></div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={onClose} style={btn()}>Annuler</button><button onClick={()=>form.nom.trim()&&onSave(form)} style={btn({background:C.acc,color:"#fff",borderColor:C.acc})}>Enregistrer</button></div>
    </div>
  </div>;
}

function FicheDetail({arbre,ficheManuelle,journal,recoltes,varietes,arbres,onMod,onPrint,onClose,onSaveJ,onSaveR,onSaveP,onSaveFiche,C,getCol,allArbres,onSwipe}){
  const [tab,setTab]=useState("info");const [nn,setNn]=useState("");const [nr,setNr]=useState({annee:new Date().getFullYear(),quantite:"",note:""});
  const [editFiche,setEditFiche]=useState(false);
  const SECTIONS=["Description botanique","Fruit / feuillage","Culture (sol, exposition)","Taille & entretien","Pollinisation","Usages & conservation"];
  const [fdata,setFdata]=useState(ficheManuelle||{});
  const [wikiQuery,setWikiQuery]=useState(arbre.nom||"");
  const [wikiSuggs,setWikiSuggs]=useState([]);
  const [wikiResult,setWikiResult]=useState(null);
  const [wikiLoad,setWikiLoad]=useState(false);
  const [wikiErr,setWikiErr]=useState(null);
  const [sites,setSites]=useState(()=>{try{const r=localStorage.getItem(SK_SITES);return r?JSON.parse(r):SITES_DEFAULT;}catch{return SITES_DEFAULT;}});
  const [editSites,setEditSites]=useState(false);
  const [newSite,setNewSite]=useState({nom:"",emoji:"🔗",url:""});

  // Swipe gauche/droite pour naviguer entre les arbres (mobile)
  const swipeRef=useRef(null);
  const onSwipeStart=e=>swipeRef.current=e.touches[0].clientX;
  const onSwipeEnd=e=>{if(swipeRef.current===null)return;const dx=e.changedTouches[0].clientX-swipeRef.current;if(Math.abs(dx)>60)onSwipe&&onSwipe(dx<0?"left":"right");swipeRef.current=null;};
  // idx = position de l'arbre courant dans la liste complète (pour les flèches ‹ ›)
  const idx=allArbres?allArbres.findIndex(a=>a.id===arbre.id):-1;
  const hasPrev=idx>0;const hasNext=allArbres&&idx<allArbres.length-1;
  const col=getCol(arbre.variete);const san=SAN[arbre.sante||"Bon"];const sc=san.c;
  const jE=(journal[arbre.id]||[]).slice().reverse();const rE=(recoltes[arbre.id]||[]).slice().sort((a,b)=>b.annee-a.annee);
  const ph=arbre.photos||[];const pollinisateur=arbre.pollinisateur?arbres.find(a=>a.id==arbre.pollinisateur):null;
  const addN=()=>{if(!nn.trim())return;const e={id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),texte:nn.trim()};onSaveJ(arbre.id,[...(journal[arbre.id]||[]),e]);setNn("");};
  const addR=()=>{if(!nr.quantite)return;onSaveR(arbre.id,[...(recoltes[arbre.id]||[]),{id:Date.now(),...nr}]);setNr({annee:new Date().getFullYear(),quantite:"",note:""});};
  const saveFiche=()=>{onSaveFiche(arbre.id,fdata);setEditFiche(false);setWikiResult(null);setWikiSuggs([]);};
  const saveSites=s=>{setSites(s);try{localStorage.setItem(SK_SITES,JSON.stringify(s));}catch{}};
  const addSite=()=>{if(!newSite.nom.trim()||!newSite.url.trim())return;const s=[...sites,{...newSite,id:Date.now()}];saveSites(s);setNewSite({nom:"",emoji:"🔗",url:""});};
  const delSite=id=>saveSites(sites.filter(s=>s.id!==id));
  const hasFiche=SECTIONS.some(s=>fdata[s]&&fdata[s].trim());
  const inp={fontSize:12,padding:"6px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:C.card,color:C.txt};
  const btn=(ex)=>({fontFamily:"Georgia,serif",fontSize:12,padding:"4px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer",...ex});

  const searchWiki=async()=>{
    if(!wikiQuery.trim())return;
    setWikiLoad(true);setWikiErr(null);setWikiResult(null);setWikiSuggs([]);
    try{
      // OpenSearch API - supporte CORS nativement
      const r=await fetch(`https://fr.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(wikiQuery)}&limit=5&namespace=0&format=json&origin=*`);
      const d=await r.json();
      // d[1] = titres, d[3] = urls
      const titres=d[1]||[];
      if(titres.length===0){setWikiErr("Aucun résultat. Essaie un autre terme.");setWikiLoad(false);return;}
      if(titres.length===1){await loadWikiPage(titres[0]);}
      else{setWikiSuggs(titres);}
    }catch(e){setWikiErr("Erreur de connexion. Vérifie ta connexion internet.");}
    setWikiLoad(false);
  };

  const loadWikiPage=async(title)=>{
    setWikiLoad(true);setWikiSuggs([]);
    try{
      const r=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}?redirect=true`,{headers:{accept:"application/json"}});
      if(!r.ok)throw new Error();
      const d=await r.json();
      setWikiResult({titre:d.title,extrait:d.extract,url:d.content_urls?.desktop?.page});
    }catch{
      // Fallback : extraire via action=query
      try{
        const r2=await fetch(`https://fr.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
        const d2=await r2.json();
        const pages=Object.values(d2.query.pages);
        const p=pages[0];
        if(p&&p.extract){
          setWikiResult({titre:p.title,extrait:p.extract.slice(0,800),url:`https://fr.wikipedia.org/wiki/${encodeURIComponent(p.title)}`});
        }else throw new Error();
      }catch{setWikiErr("Impossible de charger la page.");}
    }
    setWikiLoad(false);
  };

  const importWiki=()=>{
    if(!wikiResult)return;
    setFdata(d=>({...d,"Description botanique":(d["Description botanique"]?d["Description botanique"]+"\n\n":"")+wikiResult.extrait}));
    setWikiResult(null);
  };

  const siteUrl=s=>s.url.replace("{q}",encodeURIComponent(wikiQuery));

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:10}} onClick={onClose}>
    <div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:18,width:380,maxWidth:"100%",maxHeight:"96vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()} onTouchStart={onSwipeStart} onTouchEnd={onSwipeEnd}>
      {(hasPrev||hasNext)&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <button onClick={()=>onSwipe("right")} disabled={!hasPrev} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 12px",cursor:hasPrev?"pointer":"default",color:hasPrev?C.acc:C.border,fontSize:18}}>&#8249;</button>
        <span style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>{idx+1} / {allArbres.length}</span>
        <button onClick={()=>onSwipe("left")} disabled={!hasNext} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 12px",cursor:hasNext?"pointer":"default",color:hasNext?C.acc:C.border,fontSize:18}}>&#8250;</button>
      </div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div><p style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>{gvi(arbre.variete)} {arbre.nom}</p><p style={{margin:"2px 0 5px",fontSize:12,color:C.mut,fontFamily:"sans-serif"}}>#{arbre.numero||"—"} · {arbre.annee}</p><div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}><Badge text={arbre.variete} color={col}/><span style={{fontSize:12,fontFamily:"sans-serif",color:sc}}>{san.i} {arbre.sante||"Bon"}</span>{arbre.origine&&<span style={{fontSize:11,fontFamily:"sans-serif",color:C.mut}}>· {arbre.origine}</span>}</div>{pollinisateur&&<p style={{margin:"4px 0 0",fontSize:11,color:C.acc,fontFamily:"sans-serif"}}>🌸 {gvi(pollinisateur.variete)} {pollinisateur.nom}</p>}<div style={{marginTop:8,maxWidth:200}}><AgeBar annee={arbre.annee} color={col}/></div></div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>{arbre.photo&&<img src={arbre.photo} alt="" style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:`1px solid ${C.border}`}}/>}<button onClick={onClose} style={btn()}>✕</button></div>
      </div>
      <div style={{display:"flex",borderBottom:`1.5px solid ${C.border}`,marginBottom:12}}>{[["info","🌿"],["galerie","📷"],["journal","📓"],["recoltes","🍎"]].map(([k,ic])=><button key={k} onClick={()=>setTab(k)} style={{padding:"7px 10px",fontSize:12,fontFamily:"sans-serif",cursor:"pointer",border:"none",background:"none",color:tab===k?col:C.mut,borderBottom:`2px solid ${tab===k?col:"transparent"}`,marginBottom:-1.5,fontWeight:tab===k?600:400}}>{ic}</button>)}</div>
      {tab==="info"&&<div>
        {arbre.description&&<div style={{background:C.light,borderRadius:8,padding:"8px 12px",marginBottom:10,borderLeft:`3px solid ${col}`}}><p style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,margin:"0 0 3px",textTransform:"uppercase"}}>Notes</p><p style={{fontSize:13,margin:0,color:C.txt}}>{arbre.description}</p></div>}
        {!editFiche&&hasFiche&&<div style={{marginBottom:10}}>
          {SECTIONS.filter(s=>fdata[s]&&fdata[s].trim()).map(s=><div key={s} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <div style={{width:3,height:16,borderRadius:2,background:col,flexShrink:0}}/>
              <p style={{fontSize:11,fontFamily:"'Playfair Display',Georgia,serif",fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:1.2,margin:0}}>{s}</p>
            </div>
            <p style={{fontSize:13,margin:0,lineHeight:1.7,color:C.txt,whiteSpace:"pre-wrap",paddingLeft:11}}>{fdata[s]}</p>
          </div>)}
        </div>}
        {!editFiche&&!hasFiche&&<p style={{color:C.mut,fontStyle:"italic",fontSize:13,textAlign:"center",padding:"16px 0"}}>Aucune fiche renseignée.</p>}
        {editFiche&&<div style={{marginBottom:10}}>
          <p style={{fontSize:12,fontWeight:700,color:C.acc,margin:"0 0 8px"}}>📝 Éditer la fiche</p>
          {/* Bloc recherche */}
          
          {SECTIONS.map(s=><div key={s} style={{marginBottom:10}}>
            <label style={{fontSize:11,fontFamily:"sans-serif",color:C.mut,display:"block",marginBottom:3,fontWeight:600}}>{s}</label>
            <textarea value={fdata[s]||""} onChange={e=>setFdata(d=>({...d,[s]:e.target.value}))} rows={3} placeholder={`Renseigner : ${s.toLowerCase()}…`}
              style={{...inp,width:"100%",resize:"vertical",fontFamily:"Georgia,serif",lineHeight:1.5}}/>
          </div>)}
          <div style={{display:"flex",gap:7,justifyContent:"flex-end",marginTop:4}}>
            <button onClick={()=>{setFdata(ficheManuelle||{});setEditFiche(false);setWikiResult(null);setWikiSuggs([]);}} style={btn()}>Annuler</button>
            <button onClick={saveFiche} style={btn({background:C.acc,color:"#fff",borderColor:C.acc})}>✓ Enregistrer</button>
          </div>
        </div>}
        <div style={{display:"flex",gap:7,flexWrap:"wrap",borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:6}}>
          <button onClick={()=>{setFdata(ficheManuelle||{});setEditFiche(e=>!e);setWikiResult(null);setWikiSuggs([]);}} style={btn({background:C.light,color:C.acc,borderColor:C.acc2})}>📝 {editFiche?"Annuler édition":(hasFiche?"Modifier la fiche":"Créer la fiche")}</button>
          <button onClick={onPrint} style={btn()}>🖨️</button>
          <button onClick={onMod} style={btn()}>✏️</button>
        </div>
      </div>}
      {tab==="galerie"&&<div><p style={{fontSize:12,color:C.mut,fontFamily:"sans-serif",margin:"0 0 10px"}}>Photos au fil des saisons.</p><Galerie photos={ph} onAdd={b=>onSaveP(arbre.id,[...ph,b])} onDel={i=>onSaveP(arbre.id,ph.filter((_,idx)=>idx!==i))} C={C}/></div>}
      {tab==="journal"&&<div><div style={{display:"flex",gap:7,marginBottom:10}}><textarea value={nn} onChange={e=>setNn(e.target.value)} rows={2} placeholder="Taille, traitement…" style={{...inp,flex:1,resize:"none"}}/><button onClick={addN} style={{...btn({background:C.acc,color:"#fff",borderColor:C.acc}),alignSelf:"flex-end"}}>+</button></div>{jE.length===0&&<p style={{color:C.mut,fontStyle:"italic",fontSize:13,textAlign:"center",padding:"10px 0"}}>Aucune entrée.</p>}{jE.map(e=><div key={e.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",marginBottom:6,display:"flex",gap:8}}><div style={{flex:1}}><p style={{fontSize:11,color:C.mut,fontFamily:"sans-serif",margin:"0 0 2px"}}>{e.date}</p><p style={{fontSize:13,margin:0,color:C.txt}}>{e.texte}</p></div><button onClick={()=>onSaveJ(arbre.id,(journal[arbre.id]||[]).filter(x=>x.id!==e.id))} style={btn({color:C.dan,borderColor:C.dan+"44",alignSelf:"flex-start"})}>✕</button></div>)}</div>}
      {tab==="recoltes"&&<div><Graf list={rE} color={col} C={C}/><div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:8}}><div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap"}}><input type="number" value={nr.annee} onChange={e=>setNr(r=>({...r,annee:e.target.value}))} style={{...inp,width:70}}/><input value={nr.quantite} onChange={e=>setNr(r=>({...r,quantite:e.target.value}))} style={{...inp,flex:1}} placeholder="Quantité"/><button onClick={addR} style={btn({background:C.acc,color:"#fff",borderColor:C.acc})}>+</button></div>{rE.map(e=><div key={e.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",marginBottom:6,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:13,fontWeight:700,color:C.acc,minWidth:36}}>{e.annee}</span><span style={{fontSize:13,flex:1,color:C.txt}}>{e.quantite}</span>{e.note&&<span style={{fontSize:12,color:C.mut,fontStyle:"italic"}}>{e.note}</span>}<button onClick={()=>onSaveR(arbre.id,(recoltes[arbre.id]||[]).filter(x=>x.id!==e.id))} style={btn({color:C.dan,borderColor:C.dan+"44"})}>✕</button></div>)}</div></div>}
    </div>
  </div>;
}

function FicheImp({arbre,ficheManuelle,varietes,arbres,onClose,getCol}){
  const col=getCol(arbre.variete);const san=SAN[arbre.sante||"Bon"];
  const SECTIONS=["Description botanique","Fruit / feuillage","Culture (sol, exposition)","Taille & entretien","Pollinisation","Usages & conservation"];
  const secs=ficheManuelle?SECTIONS.filter(s=>ficheManuelle[s]&&ficheManuelle[s].trim()):[];
  const qr=`${arbre.numero||"?"}-${arbre.nom}(${arbre.variete},${arbre.annee})`;
  const pollinisateur=arbre.pollinisateur?arbres.find(a=>a.id==arbre.pollinisateur):null;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",zIndex:1000,padding:"14px 6px"}}>
    <div style={{width:"100%",maxWidth:640}}><div style={{display:"flex",gap:8,marginBottom:8,justifyContent:"flex-end"}}><button onClick={()=>window.print()} style={{fontSize:13,padding:"6px 13px",borderRadius:8,border:"1px solid #4a7c3f",background:"#4a7c3f",color:"#fff",cursor:"pointer"}}>🖨️ Imprimer</button><button onClick={onClose} style={{fontSize:13,padding:"6px 13px",borderRadius:8,border:"1px solid #d4c9a8",background:"#fff8ee",color:"#2d2a20",cursor:"pointer"}}>✕ Fermer</button></div>
      <div style={{background:"#fff",color:"#222",fontFamily:"Georgia,serif",padding:"26px 30px",borderRadius:10,border:"1.5px solid #d4c9a8",fontSize:"12.5px",lineHeight:1.65}}>
        <div style={{borderBottom:`3px solid ${col}`,paddingBottom:12,marginBottom:14,display:"flex",gap:14,alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontSize:24,fontWeight:700}}>{gvi(arbre.variete)} {arbre.nom}</div><div style={{fontSize:13,color:"#666",fontFamily:"sans-serif"}}>{arbre.variete} · {arbre.annee} · {new Date().getFullYear()-parseInt(arbre.annee)} ans</div><div style={{fontSize:12,color:san.c,fontFamily:"sans-serif"}}>{san.i} {arbre.sante||"Bon"}</div>{arbre.origine&&<div style={{fontSize:12,color:"#666",fontFamily:"sans-serif"}}>Origine : {arbre.origine}</div>}{pollinisateur&&<div style={{fontSize:12,color:"#4a7c3f",fontFamily:"sans-serif"}}>🌸 {pollinisateur.nom}</div>}</div><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{fontSize:22,fontWeight:700,color:col}}>#{String(arbre.numero||"—").padStart(3,"0")}</div><QR text={qr} size={68}/></div>{arbre.photo&&<img src={arbre.photo} alt="" style={{width:78,height:78,objectFit:"cover",borderRadius:8,border:"1px solid #ddd"}}/>}</div>
        {arbre.description&&<div style={{background:"#f5f2eb",borderLeft:`3px solid ${col}`,padding:"8px 12px",marginBottom:14,borderRadius:6}}><div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",marginBottom:3}}>Notes</div><div>{arbre.description}</div></div>}
        {secs.length>0?secs.map(s=><div key={s} style={{marginBottom:13}}><div style={{display:"flex",alignItems:"center",gap:7,borderBottom:`1.5px solid ${col}44`,paddingBottom:3,marginBottom:5}}><div style={{width:3,height:13,borderRadius:2,background:col,flexShrink:0}}/><div style={{fontSize:9,fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:1.2,fontFamily:"'Playfair Display',Georgia,serif"}}>{s}</div></div><div style={{lineHeight:1.7,whiteSpace:"pre-wrap"}}>{ficheManuelle[s]}</div></div>):<div style={{color:"#bbb",fontStyle:"italic",textAlign:"center",marginTop:20}}>Aucune fiche renseignée.</div>}
        <div style={{marginTop:20,paddingTop:8,borderTop:"1px solid #e8e0d0",display:"flex",justifyContent:"space-between",fontSize:10,color:"#aaa",fontFamily:"sans-serif"}}><span>Mon Verger</span><span>{new Date().toLocaleDateString("fr-FR")}</span></div>
      </div>
    </div>
  </div>;
}


function Etiquettes({arbres,varietes,onClose,getCol,C}){
  const [sel,setSel]=useState(arbres.map(a=>a.id));
  const [zoom,setZoom]=useState(null);
  const tog=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const selected=arbres.filter(a=>sel.includes(a.id));
  const EtiqCard=({a,size="normal"})=>{
    const col=getCol(a.variete);
    const qrSize=size==="large"?120:52;
    const nmSize=size==="large"?20:14;
    return <div style={{border:`2.5px solid ${col}`,borderRadius:10,padding:size==="large"?"16px 20px":"8px 10px",background:"#faf6ef",display:"flex",flexDirection:"column",gap:size==="large"?10:4}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:size==="large"?13:10,fontFamily:"sans-serif",fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>{a.variete}</div>
          <div style={{fontSize:nmSize,fontWeight:700,lineHeight:1.2,color:"#1a1a1a",wordBreak:"break-word"}}>{a.nom}</div>
          <div style={{fontSize:size==="large"?13:10,fontFamily:"sans-serif",color:"#888",marginTop:2}}>{a.annee}</div>
          <div style={{fontSize:size==="large"?16:12,marginTop:size==="large"?6:3}}>{gvi(a.variete)} {SAN[a.sante||"Bon"].i}</div>
        </div>
        <div style={{flexShrink:0}}><QR text={(a.numero||"?")+"-"+a.nom+"-"+a.variete} size={qrSize}/></div>
      </div>
    </div>;
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:10}} onClick={zoom!==null?()=>setZoom(null):undefined}>
    {zoom!==null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:600,padding:20}} onClick={()=>setZoom(null)}>
      <div style={{maxWidth:400,width:"100%"}} onClick={e=>e.stopPropagation()}>
        <EtiqCard a={arbres.find(a=>a.id===zoom)} size="large"/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12,gap:8}}>
          <button onClick={()=>setZoom(i=>{const idx=selected.findIndex(a=>a.id===i);return selected[(idx-1+selected.length)%selected.length].id;})} style={{flex:1,fontFamily:"Georgia,serif",fontSize:14,padding:"8px",borderRadius:8,border:"1px solid #555",background:"#222",color:"#fff",cursor:"pointer"}}>‹ Préc.</button>
          <button onClick={()=>setZoom(null)} style={{flex:1,fontFamily:"Georgia,serif",fontSize:14,padding:"8px",borderRadius:8,border:"1px solid #555",background:"#333",color:"#fff",cursor:"pointer"}}>✕ Fermer</button>
          <button onClick={()=>setZoom(i=>{const idx=selected.findIndex(a=>a.id===i);return selected[(idx+1)%selected.length].id;})} style={{flex:1,fontFamily:"Georgia,serif",fontSize:14,padding:"8px",borderRadius:8,border:"1px solid #555",background:"#222",color:"#fff",cursor:"pointer"}}>Suiv. ›</button>
        </div>
      </div>
    </div>}
    <div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:16,width:500,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <p style={{fontSize:16,fontWeight:700,margin:"0 0 10px",color:C.txt}}>🏷️ Étiquettes</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {arbres.map(a=><button key={a.id} onClick={()=>tog(a.id)} style={{fontSize:11,fontFamily:"sans-serif",padding:"3px 9px",borderRadius:7,border:`1px solid ${sel.includes(a.id)?getCol(a.variete):C.border}`,background:sel.includes(a.id)?getCol(a.variete)+"18":C.card,cursor:"pointer",color:C.txt}}>{gvi(a.variete)} #{a.numero||"?"} {a.nom}</button>)}
      </div>
      <div style={{background:"#fff",padding:10,border:`1px solid ${C.border}`,borderRadius:8,marginBottom:12}}>
        <p style={{fontSize:10,color:"#aaa",fontFamily:"sans-serif",marginBottom:8,textAlign:"center"}}>Cliquer sur une étiquette pour l'agrandir</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {selected.map(a=><div key={a.id} onClick={()=>setZoom(a.id)} style={{cursor:"pointer",transition:"transform .15s,box-shadow .15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.03)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.13)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}><EtiqCard a={a} size="normal"/></div>)}
        </div>
        {selected.length===0&&<p style={{textAlign:"center",color:"#bbb",fontStyle:"italic",fontSize:13,padding:"20px 0"}}>Aucun arbre sélectionné</p>}
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"6px 13px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer"}}>Fermer</button>

    </div>
  </div>;
}

  const [modeZone,setModeZone]=useState(false);const [drawingZone,setDrawingZone]=useState(null);const [zoneCouleur,setZoneCouleur]=useState(ZONE_COLORS[0]);const [zoneNom,setZoneNom]=useState("");const [editZone,setEditZone]=useState(false);

          return <div key={m.id} style={{position:"absolute",left:`${m.x}%`,top:`${m.y}%`,transform:"translate(-50%,-100%)",zIndex:10,cursor:"pointer"}} onClick={e=>{e.stopPropagation();if(mode==="voir")setTip(open?null:{id:m.id,arbre});else if(mode==="deplacer")setSel(sel&&sel.id===arbre.id?null:arbre);}}>

// ════════════════════════════════════════════════════════════
// LISTE DES ARBRES AVEC DRAG & DROP
// Drag & drop souris ET tactile pour réordonner manuellement.
// Modification : onDel remplacé par onAskDel → ouvre le modal
// de confirmation avant suppression définitive.
// ════════════════════════════════════════════════════════════
function ListeDnD({filtered,arbres,journal,recoltes,fiches,marqueurs,C,bsm,getCol,onFiche,onDup,onPrint,onEdit,onAskDel,onReorder,search}){
  const [order,setOrder]=useState(filtered.map(a=>a.id));
  const [dragIdx,setDragIdx]=useState(null);
  const [overIdx,setOverIdx]=useState(null);
  const dragNode=useRef(null);
  // Sync quand filtered change (filtre, tri externe)
  useEffect(()=>{setOrder(filtered.map(a=>a.id));},[filtered.map(a=>a.id).join(",")]);
  const list=order.map(id=>filtered.find(a=>a.id===id)).filter(Boolean);

  const startDrag=(e,i)=>{
    e.stopPropagation();
    setDragIdx(i);
    dragNode.current=i;
    if(e.dataTransfer){e.dataTransfer.effectAllowed="move";}
  };
  const onDragOver=(e,i)=>{e.preventDefault();if(i!==overIdx)setOverIdx(i);};
  const onDrop=(e,i)=>{
    e.preventDefault();
    if(dragIdx===null||dragIdx===i)return;
    const n=[...order];const [moved]=n.splice(dragIdx,1);n.splice(i,0,moved);
    setOrder(n);onReorder(n.map(id=>filtered.find(a=>a.id===id)).filter(Boolean));
    setDragIdx(null);setOverIdx(null);
  };
  const onDragEnd=()=>{setDragIdx(null);setOverIdx(null);};

  // Touch drag
  const touchStart=useRef(null);const touchIdx=useRef(null);
  const onTS=(e,i)=>{
    touchIdx.current=i;
    touchStart.current={y:e.touches[0].clientY,idx:i};
  };
  const onTM=(e)=>{
    if(touchStart.current===null)return;
    e.preventDefault();
    const y=e.touches[0].clientY;
    const els=document.querySelectorAll(".dnd-item");
    let over=touchStart.current.idx;
    els.forEach((el,idx)=>{const r=el.getBoundingClientRect();if(y>=r.top&&y<=r.bottom)over=idx;});
    if(over!==overIdx){setOverIdx(over);setDragIdx(touchStart.current.idx);}
  };
  const onTE=()=>{
    if(dragIdx!==null&&overIdx!==null&&dragIdx!==overIdx){
      const n=[...order];const [moved]=n.splice(dragIdx,1);n.splice(overIdx,0,moved);
      setOrder(n);onReorder(n.map(id=>filtered.find(a=>a.id===id)).filter(Boolean));
    }
    setDragIdx(null);setOverIdx(null);touchStart.current=null;
  };

  if(list.length===0)return <div style={{textAlign:"center",color:C.mut,fontSize:13,padding:"40px 0",fontStyle:"italic"}}>{arbres.length===0?"Aucun arbre encore. Commence par en ajouter un !":"Aucun résultat."}</div>;

  return <>
    {search&&<div style={{fontSize:11,color:C.mut,fontFamily:"sans-serif",marginBottom:8}}>🔍 {list.length} résultat{list.length!==1?"s":""} pour « {search} »</div>}
    {!search&&<div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",marginBottom:6,textAlign:"right"}}>⠿ Glisser pour réordonner</div>}
    {list.map((a,i)=>{
      const col=getCol(a.variete);const san=SAN[a.sante||"Bon"];const sc=san.c;
      const isDragging=dragIdx===i;const isOver=overIdx===i&&dragIdx!==null&&dragIdx!==i;
      return <div key={a.id} className="dnd-item"
        draggable onDragStart={e=>startDrag(e,i)} onDragOver={e=>onDragOver(e,i)} onDrop={e=>onDrop(e,i)} onDragEnd={onDragEnd}
        style={{background:C.card,border:`1px solid ${isOver?C.acc:a.sante==="Malade"?"#b84040":a.sante==="À surveiller"?"#8a6d1e":C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,marginBottom:7,opacity:isDragging?.4:1,transform:isOver?"translateY(-2px)":"none",boxShadow:isOver?`0 4px 16px ${C.acc}44`:"none",transition:"transform .1s,box-shadow .1s,opacity .1s",cursor:"default"}}>
        {/* Poignée drag */}
        <div onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>onTS(e,i)} onTouchMove={onTM} onTouchEnd={onTE}
          style={{cursor:"grab",color:C.mut,fontSize:16,padding:"0 2px",flexShrink:0,touchAction:"none",userSelect:"none"}}>⠿</div>
        <div onClick={()=>onFiche(a)} style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0,cursor:"pointer"}}>
          {a.photo
            ?<img src={a.photo} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:9,flexShrink:0,border:`2px solid ${col}44`}}/>
            :<div style={{width:52,height:52,borderRadius:9,flexShrink:0,background:`linear-gradient(135deg,${col}33,${col}11)`,border:`2px solid ${col}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{gvi(a.variete)}</div>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.txt}}>{a.nom}</div>
            <div style={{fontSize:11,color:C.mut,fontFamily:"sans-serif",display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",margin:"2px 0"}}>
              <span>#{a.numero||"—"}</span>
              <Badge text={a.variete} color={col}/>
              <span style={{color:sc}}>{san.i}</span>
              {a.origine&&<span style={{fontSize:10}}>· {a.origine}</span>}
              {(journal[a.id]||[]).length>0&&<span>📓</span>}
              {(recoltes[a.id]||[]).length>0&&<span>🍎</span>}
              {(a.photos||[]).length>0&&<span>📷</span>}
              {fiches[a.id]&&<span style={{color:C.acc2}}>🌿</span>}
              {marqueurs.some(m=>m.arbreId===a.id)&&<span>🗺️</span>}
              {a.pollinisateur&&<span>🌸</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
              <div style={{flex:1,maxWidth:150}}><AgeBar annee={a.annee} color={col}/></div>
