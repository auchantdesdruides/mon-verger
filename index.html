                  <div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.txt}}>{a.nom}</div>
                  <div style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",marginBottom:4}}>#{a.numero||"—"}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><Badge text={a.variete} color={col}/><span style={{color:sc}}>{san.i}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                    <div style={{flex:1,marginRight:6}}><AgeBar annee={a.annee} color={col}/></div>
                    <span style={{fontSize:9,fontFamily:"sans-serif",background:col+"22",color:col,border:`1px solid ${col}44`,borderRadius:8,padding:"1px 5px",whiteSpace:"nowrap",fontWeight:600}}>{new Date().getFullYear()-parseInt(a.annee)}a 🌳</span>
                  </div>
                </div>
              </div>
            );})}
          </div>
        </>}
        {vue==="carte"&&<Carte arbres={arbres} varietes={varietes} marqueurs={marqueurs} carteImg={carteImg} zones={zones} onSaveM={sM} onSaveI={sI} onSaveZ={sZ} C={C} onFiche={a=>setFiche(a)} getCol={getCol}/>}
      </div>

      {/* Bouton + flottant mobile */}
      {isMobile&&vue!=="carte"&&<button onClick={()=>{setEditTarget(null);setModal("arbre");}}
        style={{position:"fixed",bottom:74,right:16,width:52,height:52,borderRadius:"50%",background:C.acc,color:"#fff",border:"none",fontSize:26,cursor:"pointer",boxShadow:`0 4px 16px ${C.acc}88`,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,transition:"transform .15s"}}
        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
        onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}
        title="Ajouter un arbre">＋</button>}

      {/* Barre navigation mobile */}
      {isMobile&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:1200,background:C.card,borderTop:`1.5px solid ${C.border}`,display:"flex",zIndex:100,boxShadow:"0 -2px 12px rgba(0,0,0,.10)"}}>
        {VUES_NAV.map(([k,ic,label])=>{const active=vue===k;return <button key={k} onClick={()=>setVue(k)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"8px 0 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:`2px solid ${active?C.acc:"transparent"}`}}>
          <span style={{fontSize:18,lineHeight:1}}>{ic}</span>
          <span style={{fontSize:9,fontFamily:"sans-serif",color:active?C.acc:C.mut,fontWeight:active?700:400}}>{label}</span>
        </button>;})}
      </div>}

      {/* Footer */}
      <div style={{borderTop:`1px solid ${C.border}`,padding:`8px 14px ${isMobile?"64px":"8px"}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:C.card}}>
        <span style={{fontSize:10,color:C.mut,fontFamily:"sans-serif"}}>© {new Date().getFullYear()} Au Chant des Druides · Mon Verger</span>
        <a href="https://creativecommons.org/licenses/by-nc/4.0/deed.fr" target="_blank" rel="noreferrer"
          style={{fontSize:10,color:C.mut,fontFamily:"sans-serif",textDecoration:"none",display:"flex",alignItems:"center",gap:4,opacity:.8}}>
          <span style={{background:C.light,border:`1px solid ${C.border}`,borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:700,letterSpacing:.3}}>CC BY-NC 4.0</span>
          <span>Usage non commercial</span>
        </a>
      </div>

    </div>{/* fin zone droite */}

    {/* ── Modaux ── */}
    {modal==="theme"&&<ThemeModal theme={theme} onSave={name=>{sT(name);setModal(null);}} onClose={()=>setModal(null)} C={C}/>}
    {modal==="couleurs"&&<CouleurModal varietes={varietes} couleurs={couleurs} vIndex={v=>varietes.indexOf(v)} onSave={co=>{sC(co);setModal(null);}} onClose={()=>setModal(null)} C={C}/>}
    {modal==="io"&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:10}}><div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:18,width:320,maxWidth:"100%"}}><p style={{fontSize:16,fontWeight:700,margin:"0 0 10px",color:C.txt}}>💾 Sauvegarde</p><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}><button onClick={expData} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"8px",borderRadius:8,border:`1px solid ${C.acc}`,background:C.acc,color:"#fff",cursor:"pointer",textAlign:"center"}}>⬇️ Exporter (.json)</button><button onClick={expCSV} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"8px",borderRadius:8,border:`1px solid #5a8a5a`,background:"#5a8a5a",color:"#fff",cursor:"pointer",textAlign:"center"}}>📊 Exporter (.csv)</button><button onClick={livrePDF} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"8px",borderRadius:8,border:"1px solid #8a6d1e",background:"#8a6d1e",color:"#fff",cursor:"pointer",textAlign:"center"}}>📖 Livre du Verger (PDF)</button><div><p style={{fontSize:12,color:C.mut,margin:"0 0 5px",fontFamily:"sans-serif"}}>⬆️ Importer</p><input type="file" accept=".json" onChange={impData} style={{display:"block",width:"100%",fontSize:14,padding:"8px 4px",color:C.txt,background:C.card,border:`1px solid ${C.border}`,borderRadius:8}}/></div></div><div style={{display:"flex",justifyContent:"flex-end"}}><button onClick={()=>setModal(null)} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"6px 13px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer"}}>Fermer</button></div></div></div>}
    {modal==="arbre"&&<TreeForm initial={editTarget} varietes={varietes} arbres={arbres} onSave={editTarget?updA:addA} onClose={()=>{setModal(null);setEditTarget(null);}} C={C}/>}
    {modal==="var"&&<VarForm varietes={varietes} onSave={l=>{sV(l);setModal(null);if(!l.includes(filtreV))setFiltreV("Toutes");}} onClose={()=>setModal(null)} C={C}/>}
    {modal==="etiq"&&<Etiquettes arbres={arbres} varietes={varietes} onClose={()=>setModal(null)} getCol={getCol} C={C}/>}
    {modal==="recap"&&<FicheVerger arbres={arbres} varietes={varietes} recoltes={recoltes} onClose={()=>setModal(null)} getCol={getCol} C={C}/>}
    {fiche&&!printT&&<FicheDetail arbre={fiche} ficheManuelle={fiches[fiche.id]||null} journal={journal} recoltes={recoltes} varietes={varietes} arbres={arbres} onMod={()=>{setEditTarget(fiche);setModal("arbre");setFiche(null);}} onPrint={()=>exportFichePDF(fiche)} onClose={()=>setFiche(null)} onSaveJ={saveJ} onSaveR={saveR} onSaveP={saveP} onSaveFiche={saveFicheManuelle} C={C} getCol={getCol} allArbres={arbres} onSwipe={dir=>{const i=arbres.findIndex(a=>a.id===fiche.id);const next=arbres[i+(dir==="left"?1:-1)];if(next)setFiche(next);}}/>}
    {printT&&<FicheImp arbre={printT} ficheManuelle={fiches[printT.id]||null} varietes={varietes} arbres={arbres} onClose={()=>setPrintT(null)} getCol={getCol}/>}
    {confirmDel&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000,padding:12}}>
      <div style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:22,width:310,maxWidth:"100%",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:10}}>🗑️</div>
        <p style={{fontSize:16,fontWeight:700,color:C.txt,margin:"0 0 6px"}}>Supprimer cet arbre ?</p>
        <p style={{fontSize:14,color:C.mut,margin:"0 0 6px",fontFamily:"sans-serif"}}>{gvi(confirmDel.variete)} <strong>{confirmDel.nom}</strong></p>
        <p style={{fontSize:12,color:C.dan,fontFamily:"sans-serif",margin:"0 0 20px"}}>Cette action est irréversible.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>setConfirmDel(null)} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"8px 18px",borderRadius:9,border:`1px solid ${C.border}`,background:C.card,color:C.txt,cursor:"pointer",flex:1}}>Annuler</button>
          <button onClick={()=>delA(confirmDel.id)} style={{fontFamily:"Georgia,serif",fontSize:13,padding:"8px 18px",borderRadius:9,border:"none",background:C.dan,color:"#fff",cursor:"pointer",flex:1,fontWeight:700}}>Supprimer</button>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
  // Enregistrement du Service Worker pour le mode hors-ligne
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(err => {
        console.warn("Service Worker non enregistré :", err);
      });

      // Si une nouvelle version a été installée, on le signale et on recharge
      navigator.serviceWorker.addEventListener("message", (event) => {
        if (event.data && event.data.type === "SW_UPDATED") {
          const banner = document.createElement("div");
          banner.textContent = "🌳 Mon Verger a été mis à jour — Appuyez pour recharger";
          banner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#4a7c3f;color:#fff;text-align:center;padding:12px;font-family:Georgia,serif;font-size:14px;z-index:99999;cursor:pointer;box-shadow:0 -2px 12px rgba(0,0,0,.2);";
          banner.onclick = () => window.location.reload();
          document.body.appendChild(banner);
        }
      });
    });
  }
</script>
</body>
</html>
